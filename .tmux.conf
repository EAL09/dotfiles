# Took inspiration from https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

set -g 	mouse on
set -g	base-index 1
set -g	visual-activity on
setw -g clock-mode-colour red
setw -g mode-style 'fg=black bg=red'
set -g pane-border-style 'fg=black bold'
set -g pane-active-border-style 'fg=red'
set -g status-justify left
set -g status-style 'fg=red'
set -g status-left-length 10
set -g status-right-style 'fg=black bg=red'
setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '
setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow bold]#F '
setw -g window-status-bell-style 'fg=yellow bg=red'
set -g message-style 'fg=black bg=red'
setw -g	monitor-activity on

bind | split-window -h
bind - split-window -v

set-option -g status-position top
set-option -g status-right '%H:%M'

